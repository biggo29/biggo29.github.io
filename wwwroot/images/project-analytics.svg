<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="analytics-bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151a36"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="analytics-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="32" fill="url(#analytics-bg)"/>
  <!-- Chart bars -->
  <g filter="url(#analytics-shadow)">
    <rect x="100" y="180" width="30" height="60" rx="8" fill="#00d4ff"/>
    <rect x="150" y="140" width="30" height="100" rx="8" fill="#0066ff"/>
    <rect x="200" y="100" width="30" height="140" rx="8" fill="#ff6b6b"/>
    <rect x="250" y="160" width="30" height="80" rx="8" fill="#00d4ff"/>
  </g>
  <!-- Line graph -->
  <polyline points="115,200 165,170 215,120 265,180" fill="none" stroke="#fff" stroke-width="4"/>
  <!-- Pie chart -->
  <circle cx="320" cy="80" r="18" fill="#fff" filter="url(#analytics-shadow)"/>
  <path d="M320,80 L320,62 A18,18 0 0,1 338,80 Z" fill="#00d4ff"/>
  <path d="M320,80 L338,80 A18,18 0 1,1 320,62 Z" fill="#ff6b6b"/>
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#fff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">Analytics</text>
</svg>