<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="healthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ee0979;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#healthGradient)"/>
  
  <!-- Medical Cross -->
  <g opacity="0.8">
    <rect x="260" y="140" width="80" height="30" rx="5" fill="white" opacity="0.3"/>
    <rect x="285" y="115" width="30" height="80" rx="5" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Patient Records -->
  <g opacity="0.7">
    <rect x="100" y="120" width="80" height="100" rx="6" fill="white" opacity="0.3"/>
    <line x1="115" y1="140" x2="165" y2="140" stroke="white" stroke-width="2"/>
    <line x1="115" y1="160" x2="165" y2="160" stroke="white" stroke-width="2"/>
    <line x1="115" y1="180" x2="165" y2="180" stroke="white" stroke-width="2"/>
    <circle cx="140" cy="200" r="8" fill="white" opacity="0.4"/>
  </g>
  
  <!-- Video Consultation -->
  <g opacity="0.7">
    <rect x="420" y="120" width="90" height="70" rx="6" fill="white" opacity="0.3"/>
    <circle cx="465" cy="145" r="12" fill="white" opacity="0.4"/>
    <path d="M 460 165 Q 465 170 470 165" fill="none" stroke="white" stroke-width="2"/>
    <polygon points="485,150 495,145 495,165 485,160" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Prescription -->
  <g opacity="0.7">
    <rect x="100" y="260" width="80" height="100" rx="6" fill="white" opacity="0.3"/>
    <text x="140" y="285" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Rx</text>
    <line x1="115" y1="300" x2="165" y2="300" stroke="white" stroke-width="1.5"/>
    <line x1="115" y1="315" x2="165" y2="315" stroke="white" stroke-width="1.5"/>
    <line x1="115" y1="330" x2="165" y2="330" stroke="white" stroke-width="1.5"/>
  </g>
  
  <!-- Appointment Calendar -->
  <g opacity="0.7">
    <rect x="420" y="230" width="90" height="80" rx="6" fill="white" opacity="0.3"/>
    <rect x="420" y="230" width="90" height="15" rx="6" fill="white" opacity="0.4"/>
    <text x="465" y="270" text-anchor="middle" fill="white" font-size="24" font-weight="bold">15</text>
    <text x="465" y="295" text-anchor="middle" fill="white" font-size="10">Appointments</text>
  </g>
  
  <!-- Heart Monitor -->
  <g opacity="0.6">
    <path d="M 230 300 L 250 300 L 260 280 L 270 320 L 280 300 L 370 300" fill="none" stroke="white" stroke-width="3"/>
  </g>
  
  <!-- Stethoscope Icon -->
  <g transform="translate(520, 80)" opacity="0.5">
    <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="3"/>
    <path d="M 0 15 Q 10 40 0 60 Q -10 40 0 15" fill="none" stroke="white" stroke-width="3"/>
  </g>
</svg>