<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="apigw-bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="apigw-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="32" fill="url(#apigw-bg)"/>
  <!-- Gateway -->
  <g filter="url(#apigw-shadow)">
    <rect x="170" y="80" width="60" height="100" rx="16" fill="#fff"/>
    <!-- Gateway door -->
    <rect x="190" y="140" width="20" height="40" rx="6" fill="#00d4ff"/>
  </g>
  <!-- Connections -->
  <g stroke="#00d4ff" stroke-width="6" filter="url(#apigw-shadow)">
    <line x1="200" y1="80" x2="200" y2="40"/>
    <line x1="170" y1="130" x2="100" y2="130"/>
    <line x1="230" y1="130" x2="300" y2="130"/>
  </g>
  <g filter="url(#apigw-shadow)">
    <circle cx="200" cy="30" r="10" fill="#00d4ff"/>
    <circle cx="90" cy="130" r="10" fill="#00d4ff"/>
    <circle cx="310" cy="130" r="10" fill="#00d4ff"/>
  </g>
  <!-- Animated data flow (static for SVG) -->
  <polygon points="200,60 205,50 195,50" fill="#ff6b6b" opacity="0.7"/>
  <polygon points="150,130 160,135 160,125" fill="#ff6b6b" opacity="0.7"/>
  <polygon points="250,130 240,135 240,125" fill="#ff6b6b" opacity="0.7"/>
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#fff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">API Gateway</text>
</svg>