<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ecom-bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0066ff"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="32" fill="url(#ecom-bg)"/>
  <!-- Storefronts -->
  <g filter="url(#shadow)">
    <rect x="60" y="90" width="70" height="70" rx="14" fill="#fff"/>
    <rect x="170" y="60" width="100" height="100" rx="18" fill="#fff"/>
    <rect x="300" y="110" width="35" height="35" rx="8" fill="#fff"/>
    <!-- Store awnings -->
    <rect x="60" y="90" width="70" height="16" rx="8" fill="#00d4ff"/>
    <rect x="170" y="60" width="100" height="16" rx="8" fill="#0066ff"/>
    <rect x="300" y="110" width="35" height="10" rx="5" fill="#00d4ff"/>
  </g>
  <!-- Animated arrows (static for SVG) -->
  <polygon points="130,125 170,110 170,120 130,135" fill="#ff6b6b" opacity="0.7"/>
  <polygon points="270,120 300,127 300,137 270,130" fill="#ff6b6b" opacity="0.7"/>
  <!-- Database -->
  <ellipse cx="200" cy="230" rx="60" ry="18" fill="#fff" filter="url(#shadow)"/>
  <ellipse cx="200" cy="230" rx="60" ry="10" fill="#00d4ff" opacity="0.2"/>
  <rect x="140" y="220" width="120" height="18" rx="8" fill="#00d4ff" opacity="0.15"/>
  <!-- Dots for microservices -->
  <circle cx="200" cy="230" r="4" fill="#ff6b6b"/>
  <circle cx="180" cy="230" r="3" fill="#ff6b6b"/>
  <circle cx="220" cy="230" r="3" fill="#ff6b6b"/>
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#fff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">eCommerce</text>
</svg>