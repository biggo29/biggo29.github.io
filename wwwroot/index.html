<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <!-- FOUC prevention: apply saved theme before first paint so there is no
         flash of the wrong colour scheme. Must run before any stylesheet. -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (_) { document.documentElement.setAttribute('data-theme', 'dark'); }
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Shoaib Shahriar | Lead Software Engineer | Backend APIs | .NET</title>
    <base href="/" />
    <link rel="canonical" href="https://biggo29.github.io/" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="Shoaib Shahriar — Lead .NET Engineer. 8+ years building scalable backends, distributed microservices, and enterprise APIs. WSIS Award 2021." />
    <meta name="keywords" content="Software Engineer, Backend APIs, RESTful APIs, .NET, C#, ASP.NET Core, Microservices, Azure, CQRS, Clean Architecture, TDD, GitHub Copilot, AI Development, Event-Driven, SQL Server, JWT, OAuth2" />
    <meta name="author" content="Shoaib Shahriar" />

    <!-- ═══════════════════════════════════════════════════════════════════

         To swap the image: run generate-og-image.ps1, then update ONLY
         the two `content` URLs below and commit the new PNG.
         Ideal size : 1200 x 630 px | Format: PNG | Max: 5 MB
         Generator  : generate-og-image.ps1  (repo root)
         ═══════════════════════════════════════════════════════════════════ -->
    <meta id="og-image"     property="og:image"       content="https://biggo29.github.io/images/og-social-preview.png" />
    <meta id="og-image-alt" property="og:image:alt"   content="Shoaib Shahriar — Lead .NET Engineer" />
    <meta id="og-image-w"   property="og:image:width"  content="1200" />
    <meta id="og-image-h"   property="og:image:height" content="630" />
    <meta id="tw-image"     name="twitter:image"       content="https://biggo29.github.io/images/og-social-preview.png" />
    <meta id="tw-image-alt" name="twitter:image:alt"   content="Shoaib Shahriar — Lead .NET Engineer" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title"       content="Shoaib Shahriar | Lead Software Engineer | Backend APIs | .NET" />
    <meta property="og:description" content="8+ years building scalable .NET backends, distributed microservices, and enterprise APIs. WSIS Award 2021. Open to senior backend and architecture roles." />

    <!-- Twitter Card Meta Tags -->

    <meta name="twitter:description" content="8+ years building scalable .NET backends, distributed microservices, and enterprise APIs. WSIS Award 2021." />
    <meta name="twitter:creator"     content="@biggo29" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Hero background image — preloaded for LCP (dark is the default theme) -->
    <link rel="preload" as="image" href="images/hero-bg-dark.webp" fetchpriority="high" />

    <!-- Stylesheets -->
    <link href="css/variables.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="biggo29.github.io.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <style>
                .loading-screen {
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: #0b1220;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    z-index: 9999;
                    font-family: Inter, 'Segoe UI', system-ui, sans-serif;
                }

                .loading-spinner {
                    width: 60px;
                    height: 60px;
                    border: 4px solid rgba(59, 130, 246, 0.15);
                    border-top-color: #3b82f6;
                    border-radius: 50%;
                    animation: spin 1s linear infinite;
                }

                @keyframes spin {
                    to {
                        transform: rotate(360deg);
                    }
                }

                .loading-text {
                    margin-top: 20px;
                    color: #94a3b8;
                    font-size: 1rem;
                    letter-spacing: 0.02em;
                }
            </style>
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading Portfolio...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/site.js"></script>
</body>

</html>
