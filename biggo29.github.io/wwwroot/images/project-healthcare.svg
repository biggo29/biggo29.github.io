<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="health-bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="health-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="32" fill="url(#health-bg)"/>
  <!-- Medical cross -->
  <g filter="url(#health-shadow)">
    <rect x="180" y="100" width="40" height="100" rx="10" fill="#fff"/>
    <rect x="150" y="130" width="100" height="40" rx="10" fill="#fff"/>
  </g>
  <!-- Heartbeat line -->
  <polyline points="120,180 160,180 170,170 180,190 200,150 220,210 230,180 280,180" fill="none" stroke="#ff6b6b" stroke-width="4"/>
  <!-- Telemedicine icon (static) -->
  <circle cx="320" cy="80" r="18" fill="#fff" filter="url(#health-shadow)"/>
  <text x="320" y="88" text-anchor="middle" fill="#10b981" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">??</text>
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#fff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">Healthcare</text>
</svg>