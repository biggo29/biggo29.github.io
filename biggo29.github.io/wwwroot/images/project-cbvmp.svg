<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cbvmp-bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="cbvmp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="32" fill="url(#cbvmp-bg)"/>
  <!-- Government building -->
  <g filter="url(#cbvmp-shadow)">
    <rect x="110" y="120" width="180" height="60" rx="16" fill="#fff"/>
    <polygon points="200,70 130,120 270,120" fill="#00d4ff"/>
    <rect x="180" y="150" width="40" height="30" rx="6" fill="#00d4ff"/>
    <!-- Columns -->
    <rect x="130" y="120" width="10" height="60" rx="4" fill="#e9ecef"/>
    <rect x="260" y="120" width="10" height="60" rx="4" fill="#e9ecef"/>
    <rect x="170" y="120" width="10" height="60" rx="4" fill="#e9ecef"/>
    <rect x="220" y="120" width="10" height="60" rx="4" fill="#e9ecef"/>
  </g>
  <!-- Award trophy -->
  <g filter="url(#cbvmp-shadow)">
    <circle cx="340" cy="90" r="18" fill="#ff6b6b"/>
    <rect x="332" y="108" width="16" height="12" rx="3" fill="#ff6b6b"/>
    <text x="340" y="95" text-anchor="middle" fill="#fff" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">??</text>
  </g>
  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#fff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">CBVMP</text>
</svg>