name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, feature/portfolio-redesign-theme ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore biggo29.github.io.csproj

      - name: Build
        run: dotnet build biggo29.github.io.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish biggo29.github.io.csproj --configuration Release --no-build --output ./publish

      - name: Inject Medium settings from GitHub Secrets and Variables
        env:
          MEDIUM_BASE_URL:        ${{ vars.MEDIUM_BASE_URL }}
          MEDIUM_RSS_URL:         ${{ vars.MEDIUM_RSS_URL }}
          MEDIUM_API_KEY:         ${{ secrets.MEDIUM_API_KEY }}
          MEDIUM_COUNT:           ${{ vars.MEDIUM_COUNT }}
          MEDIUM_ORDER_DIR:       ${{ vars.MEDIUM_ORDER_DIR }}
          MEDIUM_DESC_LENGTH:     ${{ vars.MEDIUM_DESC_LENGTH }}
        run: |
          jq \
            --arg baseUrl       "${MEDIUM_BASE_URL:-https://api.rss2json.com/v1/api.json}" \
            --arg rssUrl        "${MEDIUM_RSS_URL:-https://medium.com/feed/@biggo29}" \
            --arg apiKey        "${MEDIUM_API_KEY:-}" \
            --argjson count     "${MEDIUM_COUNT:-10}" \
            --arg orderDir      "${MEDIUM_ORDER_DIR:-desc}" \
            --argjson descLen   "${MEDIUM_DESC_LENGTH:-150}" \
            '.Medium.BaseUrl = $baseUrl | .Medium.RssUrl = $rssUrl | .Medium.ApiKey = $apiKey | .Medium.Count = $count | .Medium.OrderDir = $orderDir | .Medium.DescriptionLength = $descLen' \
            ./publish/wwwroot/appsettings.json > tmp.json && mv tmp.json ./publish/wwwroot/appsettings.json

      - name: Change base href in index.html
        run: |
          sed -i 's/<base href="\/" \/>/<base href="\/" \/>/g' ./publish/wwwroot/index.html

      - name: Add .nojekyll file
        run: touch ./publish/wwwroot/.nojekyll

      - name: Copy index.html to 404.html
        run: cp ./publish/wwwroot/index.html ./publish/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4