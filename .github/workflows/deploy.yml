name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, feature/portfolio-redesign ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore biggo29.github.io.csproj

      - name: Build
        run: dotnet build biggo29.github.io.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish biggo29.github.io.csproj --configuration Release --no-build --output ./publish

      - name: Change base href in index.html
        run: |
          sed -i 's/<base href="\/" \/>/<base href="\/" \/>/g' ./publish/wwwroot/index.html

      - name: Add .nojekyll file
        run: touch ./publish/wwwroot/.nojekyll

      - name: Copy index.html to 404.html
        run: cp ./publish/wwwroot/index.html ./publish/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4